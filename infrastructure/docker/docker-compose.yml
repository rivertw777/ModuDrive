services:

  eureka-server:
    image: modu-drive-eureka-server:0.0.1-SNAPSHOT
    networks:
      - modudrive_network
    ports:
      - "10000:10000"
    environment:
      - SERVER_PORT=10000
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:10000/eureka/

  gateway-service:
    image: modu-drive-gateway-service:0.0.1-SNAPSHOT
    networks:
      - modudrive_network
    ports:
      - "10001:10001"
    environment:
      - SERVER_PORT=10001
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:10000/eureka/
      - FRONTEND_APP_URL=http://host.docker.internal:3000
    depends_on:
      member-service:
        condition: service_started

  member-service:
    image: modu-drive-member-service:0.0.1-SNAPSHOT
    networks:
      - modudrive_network
    ports:
      - "10010:10010"
    environment:
      - SERVER_PORT=10010
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:10000/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/modu_drive?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      eureka-server:
        condition: service_started

  auth-service:
    image: modu-drive-auth-service:0.0.1-SNAPSHOT
    networks:
      - modudrive_network
    ports:
      - "10011:10011"
    environment:
      - SERVER_PORT=10011
      - eureka.client.serviceUrl.defaultZone=http://eureka-server:10000/eureka/
      - JWT_SECRET_KEY=MTgxNzg1NjEwNzE3Nzc1MjA1MDA0NzUwMDQ0OTM1Mjg=
    depends_on:
      eureka-server:
        condition: service_started

networks:
  modudrive_network:
    driver: bridge